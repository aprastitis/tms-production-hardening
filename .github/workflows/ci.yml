name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tms
          POSTGRES_PASSWORD: tms_test_password
          POSTGRES_DB: tms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tms -d tms_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://tms:tms_test_password@localhost:5432/tms_test
      SECRET_KEY: ci-test-secret-not-for-production-1234567890
      JWT_SECRET: ci-test-jwt-secret-not-for-production-1234567890

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Apply migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest

      - name: Build Docker image
        run: docker build .